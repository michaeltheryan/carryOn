<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style.css">
    <meta name="appleid-signin-client-id" content="[CLIENT_ID]">
    <meta name="appleid-signin-scope" content="[SCOPES]">
    <meta name="appleid-signin-redirect-uri" content="[REDIRECT_URI]">
    <meta name="appleid-signin-state" content="[STATE]">
    <title>Signin or Create Account link</title>
</head>
<style>
    .signin-button {
        width: 210px;
        height: 40px;
    }
</style>
<body>
    <header>
        <span>
            <img src="/media/logo.png" alt="company logo"  class="logo">
        </span>
        <div id="navbar"></div>
    </header>
    <div class="fb-example">
        <h1>Sign in or <a href="registration.html" class="h1-link">create an account</a> </h1>
        <form action="user-verfication" method="post">
            <ul>
                <li>
                    <input type="text" id="name" name="name" placeholder="Name" required>
                    <label for="name"></label>
                </li>
                <li>
                    <input type="email" id="email" name="email" placeholder="Email" pattern="^[\w\-\.]+@([\w-]+\.)+[\w-]{2,}$\gm" required>
                    <label for="password"></label>
                </li>
                <li>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <label for="password"></label>
                </li>
                <li>
                    <button type="submit">Continue</button>
                </li>
            </ul>
        </form>
        <p>or</p>
        <div id="appleid-signin" class="signin-button" data-color="white" data-border="true" data-type="sign-in"></div>
        <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
        <p>
            <input type="checkbox" id="stay-in" name="stay-in">
            <label for="stay-in">Stay signed in</label>
        </p>
    </div>
<!--
flexbox

form for username and password (two factor? - regex verification)

button for forgot password

not a member?  join now

privacy notice link/button
-->
</body>
<script src="/scripts/script.js"></script>
</html>
